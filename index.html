<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside>
            <nav>
                <ul>
                    <li><img src="view-dashboard.svg" alt="" width="50">Dashboard</li>
                    <li><img src="home-variant.svg" alt="" width="30">Home</li>
                    <li><img src="card-account-details-outline.svg" alt="" width="30">Profile</li>
                    <li><img src="message.svg" alt="" width="30">Messages</li>
                    <li><img src="clock-outline.svg" alt="" width="30">History</li>
                    <li><img src="file-multiple-outline.svg" alt="" width="30">Tasks</li>
                    <li><img src="account-group.svg" alt="" width="30">Communities</li>
                    <li><img src="cog.svg" alt="" width="30">Settings</li>
                    <li><img src="help-box.svg" alt="" width="30">Support</li>
                    <li><img src="shield-check.svg" alt="" width="30">Privacy</li>
                </ul>
            </nav>
        </aside>

        <header>
            <div class="form">
                <form action="" method="get">
                    <label for="searchbar"><img src="magnify.svg" width="20" alt=""></label>
                    <input type="search" id="searchbar" name="search">
                </form>
            </div>
            <div class="name">
                <img src="bell-ring-outline.svg" width="20" alt=""><img src="cat.jpg" width="45" alt="">Abhishek Paradkar
            </div>
            <div class="info">
                <img src="cat.jpg" width="65" alt=""><pre><span>Hi there,</span>
Abhishek Paradkar (@aparadkar315)</pre>
            </div>
            <div class="button">
                <button>New</button>
                <button>Upload</button>
                <button>Share</button>
            </div>
        </header>

        <main></main>
    </div>
</body>
</html>
